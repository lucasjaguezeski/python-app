services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: python-app-api:1.0.0
    container_name: python-app-api
    env_file:
      - .env.prod
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      UVICORN_HOST: ${UVICORN_HOST:-0.0.0.0}
      UVICORN_PORT: ${UVICORN_PORT:-8000}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-postgres}

      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      DB_ECHO: ${DB_ECHO:-False}
      DB_POOL_PRE_PING: ${DB_POOL_PRE_PING:-True}

      ALEMBIC_DDL_AUTO: ${ALEMBIC_DDL_AUTO:-update}

    ports:
      - "${UVICORN_PORT:-8000}"
    networks:
      - backend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /dev/shm:size=256m
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.getenv(\"UVICORN_PORT\", \"8000\")}/docs', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 25s
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend:
    driver: bridge
